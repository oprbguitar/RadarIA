name: Scrape data (Radar Perú IA)

on:
  schedule:
    - cron: '10 10 * * *'   # 10:10 UTC = 05:10 hora de Lima, diario
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run scraper
        run: node scripts/scrape.mjs
      - name: Commit data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          if git diff --staged --quiet; then
            echo "Sin cambios en data/"
          else
            git commit -m "chore(data): actualizar normas y agro"
            git push
          fi
